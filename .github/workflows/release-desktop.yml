name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches desktop version
        run: |
          APP_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "v$APP_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match apps/desktop/package.json version v$APP_VERSION" >&2
            exit 1
          fi

      - name: Ensure release exists
        run: |
          NOTES_FILE="apps/desktop/release-notes/${GITHUB_REF_NAME}.md"

          if [ -f "$NOTES_FILE" ]; then
            if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
              gh release edit "$GITHUB_REF_NAME" \
                --title "KB Vault $GITHUB_REF_NAME" \
                --notes-file "$NOTES_FILE"
            else
              gh release create "$GITHUB_REF_NAME" \
                --title "KB Vault $GITHUB_REF_NAME" \
                --notes-file "$NOTES_FILE"
            fi
          else
            gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
              || gh release create "$GITHUB_REF_NAME" \
                --title "KB Vault $GITHUB_REF_NAME" \
                --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-macos:
    needs: prepare-release
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20.16.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        run: pnpm -C apps/desktop typecheck

      - name: Build workspace
        run: pnpm build

      - name: Publish macOS release artifacts
        run: pnpm -C apps/desktop exec electron-builder --mac dmg zip --publish always

      - name: Verify macOS signing and notarization
        run: |
          APP_PATH="$(find apps/desktop/release -maxdepth 2 -name '*.app' -print -quit)"
          DMG_PATH="$(find apps/desktop/release -maxdepth 1 -name '*.dmg' -print -quit)"

          if [ -z "$APP_PATH" ] || [ -z "$DMG_PATH" ]; then
            echo "Expected macOS release artifacts were not found." >&2
            find apps/desktop/release -maxdepth 2 -print || true
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

          echo "Verified notarized app bundle: $APP_PATH"
          echo "Found DMG artifact: $DMG_PATH"

  publish-windows:
    needs: prepare-release
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20.16.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop app
        run: pnpm -C apps/desktop typecheck

      - name: Build workspace
        run: pnpm build

      - name: Publish Windows release artifacts
        run: pnpm -C apps/desktop exec electron-builder --win nsis --publish always
